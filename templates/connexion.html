{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast-Food - Connexion Multi-Profils</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
            background: linear-gradient(135deg, #E2725B 0%, #be5a46 100%);
        }
        .login-card {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 450px; text-align: center;
        }
        .login-card h2 { font-family: 'Pacifico', cursive; color: #E2725B; margin-bottom: 25px; }
        .form-select, .form-control {
            border-radius: 10px; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd;
        }
        .btn-login {
            background-color: #E2725B; color: white; border: none; width: 100%;
            padding: 12px; border-radius: 10px; font-weight: 600; transition: 0.3s;
        }
        .btn-login:hover { background-color: #be5a46; transform: translateY(-2px); }
        .role-label { text-align: left; display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="{% static 'images/icon-app.png' %}" style="width: 80px; margin-bottom: 10px;" alt="Logo">
        <h2>Se connecter</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <label class="role-label">Je me connecte en tant que :</label>
            <select name="role" class="form-select" id="roleSelector" required>
                <option value="client">Client (Interface 3)</option>
                <option value="serveur">Serveur (Interface 4)</option>
                <option value="chef_cuisinier">Chef Cuisinier (Interface 5)</option>
                <option value="cuisinier">Cuisinier (Interface 6)</option>
                <option value="gestionnaire_stock">Gestionnaire de Stock (Interface 7)</option>
                <option value="livreur">Livreur (Interface 8)</option>
                <option value="admin">Administrateur (Interface 9)</option>
            </select>
            
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Identifiant ou Email" required>
            </div>
            
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
            </div>
            
            <button type="submit" class="btn-login">Accéder à mon espace</button>
        </form>
        
        <a href="/" style="display: block; margin-top: 20px; color: #888; text-decoration: none;">← Retour à l'accueil</a>
    </div>

</body>
</html>
